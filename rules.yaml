# ═══════════════════════════════════════════════════════════════
#  FAS Rules 配置示例
# ═══════════════════════════════════════════════════════════════

yumi_scheduler: true
dynamic_enabled: true
global_mode: "balance"

app_modes:
  com.miHoYo.GenshinImpact: "fas"
  com.tencent.tmgp.sgame: "fas"

ignored_apps:
  - com.android.systemui

fas_rules:
  # ── 基础 ──
  fps_gears: [30.0, 60.0, 90.0, 120.0, 144.0]
  fps_margin: "3"

  # ════════════════════════════════════════════════════════════
  #  PID 控制器基线系数
  # ════════════════════════════════════════════════════════════
  pid:
    kp: 0.060
    ki: 0.018
    kd: 0.008

  # ════════════════════════════════════════════════════════════
  #  自适应 PID 增益调度 (Adaptive Gain Scheduling)
  #  开启后，调度器会根据掉帧或震荡情况，自动缩放 Kp/Ki/Kd 乘子
  # ════════════════════════════════════════════════════════════
  adaptive_pid:
    enabled: true                   # 是否开启自适应 PID
    eval_interval: 60               # 评估周期（帧）
    deficit_streak_threshold: 30    # 连续掉帧多少帧触发 Kp 提升
    kp_boost_step: 0.15             # 触发掉帧时 Kp 乘子增加量
    kp_decay_step: 0.03             # 平稳时 Kp 乘子回落步长
    oscillation_threshold: 6        # 窗口内频率翻转几次视为震荡
    oscillation_window: 60          # 震荡检测窗口大小
    kd_boost_step: 0.20             # 震荡时 Kd 乘子（阻尼）增加量
    kp_osc_reduce_step: 0.08        # 震荡时 Kp 乘子削减量
    kd_decay_step: 0.05             # 平稳时 Kd 乘子回落步长
    min_gain_mult: 0.5              # 乘子下限 (即基线系数的 0.5倍)
    max_gain_mult: 2.5              # 乘子上限 (即基线系数的 2.5倍)

  # ════════════════════════════════════════════════════════════
  #  集群配置（Capacity-Aware）
  # ════════════════════════════════════════════════════════════
  # 是否自动读取内核 EAS cpu_capacity 节点计算权重。
  # 设为 true 时，将忽略下方的 cluster_profiles，自动适应不同手机！
  auto_capacity_weight: true

  # 仅当 auto_capacity_weight 为 false 或内核不支持时，使用的 Fallback 静态配置
  cluster_profiles:
    - capacity_weight: 1.0   # 小核
    - capacity_weight: 1.5   # 中核
    - capacity_weight: 2.5   # 大核
    - capacity_weight: 3.5   # 超大核

  # ── 归一化 perf 范围 ──
  perf_floor: 0.20
  perf_ceil: 1.0
  perf_init: 0.40
  perf_cold_boot: 0.85

  # ── 频率迟滞 ──
  freq_hysteresis: 0.015

  # ── 重帧 / 硬加载 ──
  heavy_frame_threshold_ms: 150.0
  loading_cumulative_ms: 2500.0
  loading_normal_tolerance: 3
  loading_perf_floor: 0.60
  loading_perf_ceiling: 0.70
  loading_reentry_cooldown: 60

  # ── 加载退出后 ──
  post_loading_ignore_frames: 5
  post_loading_perf_min: 0.50
  post_loading_perf_max: 0.80
  post_loading_downgrade_guard: 90

  # ── 持续加载 ──
  sustained_loading_cycle_threshold: 3
  sustained_loading_window_ns: 10000000000
  sustained_post_loading_ignore: 30

  # ── 瞬时误差 ──
  instant_error_threshold_ms: 4.0

  # ── 软加载 ──
  soft_loading_fps_ratio: 0.5
  soft_loading_perf_threshold: 0.70
  soft_loading_confirm_frames: 30
  soft_loading_perf_cap: 0.40
  soft_loading_exit_frames: 45
  soft_loading_breakthrough_fps_ratio: 0.65
  soft_loading_breakthrough_window: 15
  soft_loading_exit_frames_breakthrough: 20
  soft_loading_probe_interval: 120
  soft_loading_probe_duration: 15
  soft_loading_probe_perf_cap: 0.70
  soft_loading_probe_fps_gain_ratio: 0.3
  soft_loading_probe_fail_decay_step: 0.10
  soft_loading_downgrade_check_frames: 45
  soft_loading_gear_match_tolerance: 8.0

  # ── 应用切换 ──
  app_switch_gap_ms: 3000.0
  app_switch_resume_perf: 0.60
  app_switch_ignore_frames: 8

  # ── 场景过渡 ──
  scene_transition_cv_threshold: 0.45
  scene_transition_guard_frames: 40
  scene_transition_max_continuous: 120
  scene_transition_fps_floor_ratio: 0.3
  scene_transition_force_exit_frames: 15

  # ── Jank 冷却 ──
  jank_cooldown_frames_crit: 15
  jank_cooldown_frames_heavy: 8

  # ── 降档 ──
  downgrade_confirm_frames: 90
  downgrade_boost_perf_inc: 0.15
  downgrade_boost_duration: 45
  downgrade_proximity_ratio: 0.92
  upgrade_cooldown_after_downgrade: 90
  stable_forgive_frames: 900

  # ── 快速衰减 ──
  fast_decay_frame_threshold: 60
  fast_decay_perf_threshold: 0.65
  fast_decay_max_step: 0.030
  fast_decay_min_step: 0.005
  fast_decay_post_jank_suppress: 120

  # ── deficit 抑制 ──
  deficit_suppress_ms: 0.3

  # ── Mismatch 容忍与对抗 ──
  mismatch_lock_threshold: 12
  mismatch_reapply_skip_cycles: 5

  # ── PID 输出限幅 ──
  max_inc_damped: 0.07
  max_inc_normal: 0.12
  damped_perf_cap: 0.90

  # ── 频率重应用 ──
  freq_force_reapply_interval: 30
  fixed_max_frame_ms: 500.0

  # ── 冷启动 ──
  cold_boot_ms: 3500