# 元数据信息
meta:
  name: "mt6833"
  author: "yuki"
  language: "en"
  loglevel: "INFO"

# 主要功能开关
function:
  AffinitySetter: false
  CpuIdleScalingGovernor: false
  EasScheduler: true
  cpuset: true
  LoadBalancing: true
  EnableFeas: false
  IOOptimization: true
  AppLaunchBoost: true

# App启动加速设置
AppLaunchBoostSettings:
  BoostRateMs: 600
  SmallCoreBoostFreq: ""
  MediumCoreBoostFreq: ""
  BigCoreBoostFreq: ""
  SuperBigCoreBoostFreq: ""

# 核心分配设置 (适配天玑6080)
CoreAllocation:
  CpuSetCore: "4-7"

# 核心框架路径 (适配天玑6080的 6小核+2大核 架构)
CoreFramework:
  SmallCorePath: 0       
  MediumCorePath: 6     
  BigCorePath: -1        
  SuperBigCorePath: -1   

# IO 设置（遍历 /sys/block/* 所有块设备）
IO_Settings:
  Scheduler: "none"
  read_ahead_kb: "128"
  nomerges: "2"
  iostats: "0"
# CFS 调度器参数
CompletelyFairSchedulerValue:
  sched_child_runs_first: ""
  sched_rt_period_us: ""
  sched_rt_runtime_us: ""

# CPU 空闲设置
CpuIdle:
  current_governor: ""

# Cpuset 分组 (适配天玑6080的 6+2 架构)
Cpuset:
  top_app: "0-7"
  foreground: "0-7"
  restricted: "0-5"             
  system_background: "0-3"     
  background: "0-5"             

#调速器参数（path可加） 
pGovPath:
  schedutil:
    path1: ""
    path2: ""
    path3: ""
  walt:
    path1: ""
    path2: ""
    path3: ""

# --- 性能模式 ---

# 省电模式
powersave:
  # 调速器
  Governor:
    global: "schedutil"
    SmallCore: ""
    MediumCore: ""
    BigCore: ""
    SuperBigCore: ""
  # 频率
  Freq:
    SmallCoreMinFreq: 500000
    SmallCoreMaxFreq: 1200000   
    MediumCoreMinFreq: 600000     
    MediumCoreMaxFreq: 1400000     
    BigCoreMinFreq: 0
    BigCoreMaxFreq: 0     
    SuperBigCoreMinFreq: 0
    SuperBigCoreMaxFreq: 0
  # 频率限制
  Uclamp:
    UclampTopAppMin: "0"
    UclampTopAppMax: "100"
    UclampTopApplatency_sensitive: "0"
    UclampForeGroundMin: "0"
    UclampForeGroundMax: "70"
    UclampBackGroundMin: "0"
    UclampBackGroundMax: "50"
  #调速器参数值
  Govsets:
    schedutil:
      path1: 
        SmallCore: ""
        MediumCore: ""
        BigCore: ""
        SuperBigCore: ""
      path2: 
        SmallCore: ""
        MediumCore: ""
        BigCore: ""
        SuperBigCore: ""
      path3: 
        SmallCore: ""
        MediumCore: ""
        BigCore: ""
        SuperBigCore: ""
  # 其他设置
  Other:
    ufsClkGate: false

