yumi_scheduler: true
dynamic_enabled: true
global_mode: "balance"

app_modes:
  com.miHoYo.GenshinImpact: "fas"
  com.tencent.tmgp.sgame: "fas"
  com.tencent.tmgp.speedmobile: "fas"

ignored_apps:
  - com.android.systemui

# 全局 CPU 负载感知调频器
# 对所有非 FAS 模式的前台应用生效
# 进入 FAS 模式时自动让位，退出 FAS 后自动恢复
cpu_load_governor:
  # 总开关 (true/false)
  enabled: true

  # ---- 触发阈值 ----
  # 核心利用率超过此值时触发升频 (0.0~1.0)
  up_threshold: 0.80
  # 核心利用率低于此值时开始降频 (0.0~1.0)
  down_threshold: 0.30

  # ---- 降频速率限制 ----
  # 连续观测到低负载 N 个 tick 后才开始降频 (每 tick ≈ 200ms)
  # 值越大越不容易误降频，但响应慢；推荐 3~8
  down_rate_limit_ticks: 5

  # ---- 频率范围 ----
  # 最低性能比例 (0.0~1.0)，越低越省电，但响应延迟越大
  perf_floor: 0.15
  # 最高性能比例 (0.0~1.0)，1.0 = 允许拉满
  perf_ceil: 0.95
  # 初始性能值 (模式切换时的起始点)
  perf_init: 0.40

  # ---- 平滑系数 ----
  # 升频 EMA 系数 (越大越激进，推荐 0.3~0.6)
  smoothing_up: 0.45
  # 降频 EMA 系数 (越小越平滑，推荐 0.10~0.25)
  smoothing_down: 0.15

  # ---- 余量系数 ----
  # target_perf = 实际利用率 × headroom_factor
  # 1.0 = 刚好跟随负载；1.25 = 预留 25% 余量避免卡顿
  headroom_factor: 1.25

fas_rules:
  # ── 基础与齿轮 (全局默认) ──
  fps_gears: [30.0, 60.0, 90.0, 120.0, 144.0]
  fps_margin: 3.0

  # ── 独立游戏 FAS 配置 ──
  # per_app_profiles 下的每个游戏必须缩进到其内部
  per_app_profiles:
    "com.miHoYo.GenshinImpact":
      fps_gears: [30, 60]        # 该游戏全局可用档位
      fps_margin: 4.0             # 该游戏默认 margin

      loading:                    # 加载动画场景（由连续重帧自动触发）
        fps_gears: [30]           # 加载时只保留 30fps 档
        fps_margin: 8.0           # 放宽 margin 节电
        perf_floor: 0.30
        perf_ceil: 0.60

      lobby:                      # 大厅/菜单场景（CPU 负载低于阈值）
        fps_gears: [30, 60]
        fps_margin: 5.0
        perf_ceil: 0.75

      ingame:                     # 对局中场景（CPU 负载高于阈值）
        fps_gears: [30, 60]
        fps_margin: 3.0
        perf_init: 0.55           # 进入对局时重置到此 perf

      ingame_cpu_threshold: 0.45  # 大厅→对局判定阈值
      scene_debounce_frames: 90   # 场景切换防抖帧数

    "com.tencent.tmgp.pubgmhd":
      fps_gears: [60, 120, 144]        # 该游戏全局可用档位
      fps_margin: 4.0             # 该游戏默认 margin

      loading:                    # 加载动画场景（由连续重帧自动触发）
        fps_gears: [30, 60]           # 加载时只保留 30fps 档
        fps_margin: 8.0           # 放宽 margin 节电
        perf_floor: 0.30
        perf_ceil: 0.60

      lobby:                      # 大厅/菜单场景（CPU 负载低于阈值）
        fps_gears: [30, 60]
        fps_margin: 5.0
        perf_ceil: 0.75

      ingame:                     # 对局中场景（CPU 负载高于阈值）
        fps_gears: [144]
        fps_margin: 3.0
        perf_init: 0.55           # 进入对局时重置到此 perf

      ingame_cpu_threshold: 0.45  # 大厅→对局判定阈值
      scene_debounce_frames: 144   # 场景切换防抖帧数

    "com.tencent.tmgp.speedmobile":
      fps_gears: [60, 120, 144]        # 该游戏全局可用档位
      fps_margin: 4.0             # 该游戏默认 margin

      loading:                    # 加载动画场景（由连续重帧自动触发）
        fps_gears: [30, 60]           # 加载时只保留 30fps 档
        fps_margin: 8.0           # 放宽 margin 节电
        perf_floor: 0.30
        perf_ceil: 0.60

      lobby:                      # 大厅/菜单场景（CPU 负载低于阈值）
        fps_gears: [30, 60]
        fps_margin: 5.0
        perf_ceil: 0.75

      ingame:                     # 对局中场景（CPU 负载高于阈值）
        fps_gears: [120, 144]
        fps_margin: 3.0
        perf_init: 0.55           # 进入对局时重置到此 perf

      ingame_cpu_threshold: 0.45  # 大厅→对局判定阈值
      scene_debounce_frames: 144   # 场景切换防抖帧数

    com.tencent.tmgp.sgame:
      fps_gears: [60, 120, 144]        # 该游戏全局可用档位
      fps_margin: 4.0             # 该游戏默认 margin

      loading:                    # 加载动画场景（由连续重帧自动触发）
        fps_gears: [30, 60]           # 加载时只保留 30fps 档
        fps_margin: 8.0           # 放宽 margin 节电
        perf_floor: 0.30
        perf_ceil: 0.60

      lobby:                      # 大厅/菜单场景（CPU 负载低于阈值）
        fps_gears: [30, 60]
        fps_margin: 5.0
        perf_ceil: 0.75

      ingame:                     # 对局中场景（CPU 负载高于阈值）
        fps_gears: [120]
        fps_margin: 3.0
        perf_init: 0.55           # 进入对局时重置到此 perf

      ingame_cpu_threshold: 0.45  # 大厅→对局判定阈值
      scene_debounce_frames: 144   # 场景切换防抖帧数

  # ── PID 控制器核心系数 ──
  pid:
    kp: 0.035
    ki: 0.015
    kd: 0.005

  # ── 集群算力感知 ──
  auto_capacity_weight: true
  cluster_profiles:
    - capacity_weight: 1.0   # 小核
    - capacity_weight: 1.5   # 中核
    - capacity_weight: 2.5   # 大核
    - capacity_weight: 3.5   # 超大核

  # ── 归一化性能 (Perf) 范围 ──
  perf_floor: 0.18
  perf_ceil: 1.0
  perf_init: 0.40
  perf_cold_boot: 0.85
  freq_hysteresis: 0.015

  # ── 重帧 / 硬加载 ──
  heavy_frame_threshold_ms: 150.0
  loading_cumulative_ms: 2500.0
  loading_normal_tolerance: 3
  loading_perf_floor: 0.60
  loading_perf_ceiling: 0.70

  # ── 加载后保护 ──
  post_loading_ignore_frames: 5
  post_loading_perf: 0.65
  post_loading_downgrade_guard: 90

  # ── 齿轮切换与阻尼 ──
  upgrade_confirm_frames: 60
  downgrade_confirm_frames: 90
  upgrade_cooldown_after_downgrade: 90
  gear_dampen_frames: 60

  # ── 降档紧急提频 (Boost) ──
  downgrade_boost_perf_inc: 0.15
  downgrade_boost_duration: 45

  # ── 连续稳态快速衰减 (省电核心) ──
  fast_decay_frame_threshold: 60
  fast_decay_perf_threshold: 0.65
  fast_decay_max_step: 0.030
  fast_decay_min_step: 0.005

  # ── Jank 卡顿保护冷却 ──
  jank_cooldown_frames: 10

  # ── PID 输出限幅 (防过冲) ──
  max_inc_damped: 0.035
  max_inc_normal: 0.06
  damped_perf_cap: 0.90

  # ── 应用切换 / 息屏检测 ──
  app_switch_gap_ms: 3000.0
  app_switch_resume_perf: 0.60

  # ── 其他底层机制 ──
  freq_force_reapply_interval: 30
  fixed_max_frame_ms: 500.0
  cold_boot_ms: 3500